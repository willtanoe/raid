name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    name: Build and upload release assets
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -trimpath \
            -ldflags="-s -w -X github.com/willtanoe/raid/internal/raid.Version=${GITHUB_REF_NAME#v}" \
            -o "raid-${{ matrix.goos }}-${{ matrix.goarch }}" \
            ./cmd/raid
          if [[ "${{ matrix.goos }}" == "linux" && "${{ matrix.goarch }}" == "amd64" ]]; then
            cp "raid-${{ matrix.goos }}-${{ matrix.goarch }}" raid
          fi

      - name: Upload release assets
        env:
          GH_REPO: ${{ github.repository }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            "raid-${{ matrix.goos }}-${{ matrix.goarch }}" \
            --clobber
          if [[ -f raid ]]; then
            gh release upload "${GITHUB_REF_NAME}" raid --clobber
          fi
