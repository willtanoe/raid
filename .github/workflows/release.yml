name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  create-release:
    name: Create release
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      upload_url: ${{ steps.create.outputs.upload_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Create release
        id: create
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            --draft

  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: create-release
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -trimpath \
            -ldflags="-s -w -X github.com/willtanoe/raid/internal/raid.Version=${GITHUB_REF_NAME#v}" \
            -o "raid-${{ matrix.goos }}-${{ matrix.goarch }}" \
            ./cmd/raid
          if [[ "${{ matrix.goos }}" == "linux" && "${{ matrix.goarch }}" == "amd64" ]]; then
            cp "raid-${{ matrix.goos }}-${{ matrix.goarch }}" raid
          fi

      - name: Upload release assets
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            "raid-${{ matrix.goos }}-${{ matrix.goarch }}" \
            --clobber
          if [[ -f raid ]]; then
            gh release upload "${GITHUB_REF_NAME}" raid --clobber
          fi

  publish:
    name: Publish release
    needs: [create-release, build]
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Publish release
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release edit "${GITHUB_REF_NAME}" --draft=false
